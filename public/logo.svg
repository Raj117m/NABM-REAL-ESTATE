<svg xmlns="http://www.w3.org/2000/svg" viewBox="50 20 290 220" width="100%" height="100%">
  <!-- Left Pillar (Yellow/Orange) -->
  <g transform="translate(100, 150)">
    <!-- Top -->
    <polygon points="0,-80 -40,-60 0,-40 40,-60" fill="#E8A922"/>
    <!-- Left -->
    <polygon points="-40,-60 0,-40 0,60 -40,40" fill="#FCD289"/>
    <!-- Right -->
    <polygon points="0,-40 40,-60 40,40 0,60" fill="#F09A0D"/>
  </g>
  
  <!-- Middle Pillar (Grey) -->
  <g transform="translate(195, 140)">
    <!-- Top -->
    <polygon points="0,-120 -40,-100 0,-80 40,-100" fill="#7D8186"/>
    <!-- Left -->
    <polygon points="-40,-100 0,-80 0,80 -40,60" fill="#ACAEB0"/>
    <!-- Right -->
    <polygon points="0,-80 40,-100 40,60 0,80" fill="#63666A"/>
  </g>
  
  <!-- Right Pillar (Teal) -->
  <g transform="translate(290, 150)">
    <!-- Top -->
    <polygon points="0,-80 -40,-60 0,-40 40,-60" fill="#159196"/>
    <!-- Left -->
    <polygon points="-40,-60 0,-40 0,60 -40,40" fill="#30BAC0"/>
    <!-- Right -->
    <polygon points="0,-40 40,-60 40,40 0,60" fill="#067D83"/>
  </g>
</svg>
